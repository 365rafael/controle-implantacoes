<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Implantações</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e86de">
</head>
<body>

<h1>📅 Controle de Implantações</h1>

<div class="card">
<h3>➕ Registrar Implantação</h3>
<input id="cliente" placeholder="Nome do cliente" />
<input type="date" id="data" />
<button onclick="salvar()">Salvar</button>
<button onclick="exportar()" style="background:#27ae60;margin-left:10px">Exportar Backup</button>
<button onclick="document.getElementById('fileInput').click()" 
        style="background:#8e44ad;margin-left:10px">
📂 Restaurar Backup
</button>

<input type="file" id="fileInput" accept=".json" 
       style="display:none" 
       onchange="restaurarBackup(event)">
</div>

<div class="card">
<h3>📆 Agenda</h3>
<select id="mes" onchange="gerarCalendario()"></select>
<select id="ano" onchange="gerarCalendario()"></select>
<div id="calendar"></div>
</div>

<div class="card">
<h3>📊 Relatório Mensal</h3>
<button onclick="exportarPDF()" style="background:#e67e22;margin-bottom:10px">
📄 Exportar Relatório em PDF
</button>
<div id="total"></div>
<div id="lista"></div>
</div>

<div class="card">
  <h3>📊 Gráfico Mensal</h3>
  <canvas id="grafico" height="100"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
